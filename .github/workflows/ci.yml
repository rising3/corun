name: CI

on:
  push:
    branches:
      - main
      - next
      - "feature/**"
  pull_request:
    branches:
      - main
      - next
      - "feature/**"

jobs:
  build-and-test:
    name: Lint, Format, Test, Build
    runs-on: ubuntu-latest

    steps:
      # Step 1: ソースコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: 必要ツールをインストール
      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          # bash は ubuntu-latest に標準搭載 (5.x)
          # shellcheck / shfmt / bats / jq / make は apt で一括インストール
          sudo apt-get install -y shellcheck shfmt bats jq make
          # yq (mikefarah/yq) は apt 未収録のため直接インストール
          YQ_VERSION="4.40.5"
          curl -sSLo /tmp/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo install -m 755 /tmp/yq /usr/local/bin/yq
          # バージョン確認
          bash --version | head -1
          shellcheck --version | head -2
          shfmt --version
          bats --version
          jq --version
          yq --version
          make --version | head -1

      # Step 3: 静的解析 (ShellCheck)
      - name: Lint (shellcheck)
        run: make lint

      # Step 4: フォーマットチェック (shfmt --diff)
      # 差分があれば CI 失敗
      - name: Format check (shfmt --diff)
        run: make format-check

      # Step 5: 単体テスト
      - name: Unit tests (bats)
        run: make test

      # Step 6: 結合テスト
      - name: Integration tests (bats)
        run: make integration_test

      # Step 7: ビルド
      - name: Build
        run: make build

      # Step 8: テスト結果・カバレッジをアップロード
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .bats_tmp/
          if-no-files-found: ignore
